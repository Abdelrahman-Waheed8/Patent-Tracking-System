<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="inventore.css">
    <title>Document</title>
</head>
<body>
        <nav class="panel-header">
        <div class="left">
            <i class="fas fa-list icon-btn"></i>
            <h6>Dashboard</h6>
        </div>
        <div class="right">
            <i class="fas fa-bell"></i>
            <i class="fas fa-search icon-btn"></i>
            <div class="user icon-btn">
                <i class="fas fa-user"></i>
                <i class="fas fa-chevron-down small"></i>
            </div>
        </div>
    </nav>
       <div class="container">


        <form class="disclosure-form">
            <h2>Invention Disclosure</h2>
            
            <div class="input-group">
                <label for="title">Invention Title</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="input-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="6" ></textarea>
            </div>

            <div class="input-group">
                <label for="prior-art">Prior Art References</label>
                <input type="text" id="prior-art" name="prior-art">
            </div>

            <div class="upload-container">
                <label class="upload-box">
                    <input type="file" multiple>
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Upload Files</span>
                </label>
            </div>

            <div class="form-footer">
                <button type="submit" class="submit-btn">Submit</button>
            </div>
        </form>
    </div>
</body>
</html>
